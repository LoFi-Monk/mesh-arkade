name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  brittle-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install bare-runtime
        run: npm i -g bare-runtime

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Check Coverage
        run: npm run coverage:check
