name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.12.0'
        cache: 'npm'

    # Use install with legacy-peer-deps to stabilize against Vite/React peer conflicts
    # --ignore-scripts bypasses Husky CI failures in this environment
    - name: Install dependencies
      run: npm install --legacy-peer-deps --ignore-scripts

    - name: Type check
      run: npm run typecheck

    - name: Run tests with coverage
      run: npm test -- --coverage

    - name: Security audit
      run: npm audit --audit-level=high

  lint-and-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.12.0'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps --ignore-scripts

    - name: Check TSDoc
      run: node scripts/check-tsdoc.mjs --strict
